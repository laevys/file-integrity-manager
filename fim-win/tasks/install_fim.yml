---
- name: Créer le répertoire FIM principal
  win_file:
    path: "C:/ProgramData/fim"
    state: directory

- name: Arrêter le service FIM s'il existe
  win_service:
    name: "{{ fim_service_name }}"
    state: stopped
  ignore_errors: yes

- name: Copier le binaire FIM
  win_copy:
    src: "fim.exe"
    dest: "{{ fim_win_binary_path }}"
    backup: yes
  register: fim_binary_deployed

- name: Copier le checksum
  win_copy:
    src: "fim.exe.sha256"
    dest: "{{ fim_win_binary_path }}.sha256"

