- name: Démarrer la tâche planifiée
  win_shell: |
    Start-ScheduledTask -TaskName "{{ fim_service_name }}"
  ignore_errors: yes
  when: fim_create_service | default(true)

- name: Afficher le statut du déploiement
  debug:
    msg: |
      ✅ FIM déployé avec succès
      - Binaire: {{ fim_win_binary_path }}
      - Configuration: {{ fim_win_config_path }}
      - Checksum: Vérifié
      - Service: {{ 'Configuré' if fim_create_service else 'Non configuré' }}
